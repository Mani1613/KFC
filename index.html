<!DOCTYPE html>
<html lang="en">
<head>
    <title>KFC Order Form - 100% Working</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #ff6b35, #f7931e); 
            min-height: 100vh; 
            padding: 20px 0;
        }
        .kfc-header { 
            background: linear-gradient(45deg, #d32f2f, #f44336); 
            padding: 30px 0; 
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .accordion-button { 
            background: #d32f2f !important; 
            color: white !important; 
            font-weight: bold; 
            border-radius: 10px;
        }
        .accordion-button:not(.collapsed) { 
            background: #b71c1c !important; 
            color: white !important;
        }
        .meal-card, .addon-card {
            border: 3px solid #ff6b35; 
            border-radius: 15px; 
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .meal-card:hover, .addon-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); 
            border-color: #d32f2f;
        }
        .form-check-input {
            transform: scale(1.3);
            margin-right: 10px;
        }
        .form-check-input:checked {
            background-color: #d32f2f;
            border-color: #d32f2f;
            box-shadow: 0 0 10px rgba(212, 47, 47, 0.5);
        }
        .price { 
            font-size: 1.3em; 
            font-weight: bold; 
            color: #d32f2f; 
        }
        .btn-place-order {
            background: linear-gradient(45deg, #d32f2f, #f44336) !important;
            border: none;
            font-size: 1.2em;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .btn-place-order:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-header { 
            background: linear-gradient(45deg, #d32f2f, #f44336); 
            color: white; 
            border-radius: 15px 15px 0 0;
        }
        .total-amount {
            font-size: 2em;
            font-weight: bold;
            color: #28a745;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="kfc-header text-center text-white">
            <i class="bi bi-fire fs-1 mb-3 d-block"></i>
            <h1 class="display-4 fw-bold mb-2">KFC</h1>
            <p class="lead mb-0">Order Your Finger Lickin' Good Meal! 🧡</p>
        </div>

        <div class="accordion" id="kfcAccordion">
            
            <!-- 1. Customer Info -->
            <div class="accordion-item shadow-lg mb-4 rounded-3 overflow-hidden">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#customer">
                        <i class="bi bi-person-circle me-3 fs-4"></i>👤 Customer Details
                    </button>
                </h2>
                <div id="customer" class="accordion-collapse collapse show" data-bs-parent="#kfcAccordion">
                    <div class="accordion-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold fs-5">👤 Full Name</label>
                                <input type="text" id="txtName" class="form-control form-control-lg" placeholder="Enter your name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold fs-5">📱 Mobile No.</label>
                                <input type="tel" id="txtMobile" class="form-control form-control-lg" placeholder="10 digit number">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Main Meals -->
            <div class="accordion-item shadow-lg mb-4 rounded-3 overflow-hidden">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#meals">
                        <i class="bi bi-emoji-sunglasses me-3 fs-4"></i>🍔 Choose Main Meal (Select 1)
                    </button>
                </h2>

                </div>
            </div>
        </div>

        <!-- Order Summary Modal -->
        <div class="modal fade" id="orderModal" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header">
                        <h3 class="modal-title">
                            <i class="bi bi-receipt-cutoff me-2"></i>✅ Order Summary
                        </h3>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <strong>👤 Customer:</strong> <span id="lblName"></span>
                            </div>
                            <div class="col-md-6">
                                <strong>📱 Mobile:</strong> <span id="lblMobile"></span>
                            </div>
                        </div>
                        
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <strong>🍔 Main Meal:</strong> <span id="lblMeal" class="text-danger fw-bold fs-5"></span>
                            </div>
                        </div>
                        
                        <div class="row g-3 mb-4">
                            <div class="col-12">
                                <strong>➕ Add-ons:</strong>
                                <div id="lblAdon" class="mt-2"></div>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        
                        <div class="row text-center">
                            <div class="col-6">
                                <h5>Total Items: <span id="itemCount" class="badge bg-success fs-6">0</span></h5>
                            </div>
                            <div class="col-6">
                                <h4 class="total-amount" id="lblAmount">₹0</h4>
                            </div>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-6">
                                <a href="https://wa.me/919876543210?text=Hi%20KFC%2C%20my%20order%3A" 
                                   class="btn btn-success btn-lg w-100" target="_blank">
                                    <i class="bi bi-whatsapp me-2"></i>Send to WhatsApp
                                </a>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-primary btn-lg w-100" onclick="printReceipt()">
                                    <i class="bi bi-printer me-2"></i>Print Receipt
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Helper functions for better UX
        function selectMeal(radioId) {
            document.getElementById(radioId).checked = true;
        }
        
        function toggleAddon(checkboxId) {
            const checkbox = document.getElementById(checkboxId);
            checkbox.checked = !checkbox.checked;
        }
        
        function placeOrder() {
            const name = document.getElementById("txtName").value.trim();
            const mobile = document.getElementById("txtMobile").value.trim();
            
            if (!name) {
                alert("⚠️ Please enter your name!");
                document.getElementById("txtName").focus();
                return;
            }
            
            if (!mobile || mobile.length !== 10 || !/^\d+$/.test(mobile)) {
                alert("⚠️ Please enter valid 10-digit mobile number!");
                document.getElementById("txtMobile").focus();
                return;
            }
            
            // Calculate order
            const burger = document.getElementById("optBurger").checked;
            const roller = document.getElementById("optRoller").checked;
            const wings = document.getElementById("optWings").checked;
            const krusher = document.getElementById("optKrusher").checked;
            
            let mealName = "None selected";
            let mealCost = 0;
            let addons = [];
            let addonCost = 0;
            let itemCount = 0;
            
            if (burger) {
                mealName = "🍔 OMG Burger";
                mealCost = 120;
                itemCount++;
            } else if (roller) {
                mealName = "🌯 OMG Roller";
                mealCost = 100;
                itemCount++;
            }
            
            if (wings) {
                addons.push("🍗 Hot Wings");
                addonCost += 70;
                itemCount++;
            }
            
            if (krusher) {
                addons.push("🍫 Krusher Brownie");
                addonCost += 40;
                itemCount++;
            }
            
            const total = mealCost + addonCost;
            const addonText = addons.length ? addons.join("<br>") : "None selected";
            
            // Update modal
            document.getElementById("lblName").textContent = name;
            document.getElementById("lblMobile").textContent = mobile;
            document.getElementById("lblMeal").textContent = mealName;
            document.getElementById("lblAdon").innerHTML = addonText;
            document.getElementById("lblAmount").textContent = "₹" + total.toLocaleString();
            document.getElementById("itemCount").textContent = itemCount;
            
            // Show modal
            new bootstrap.Modal(document.getElementById('orderModal')).show();
        }
        
        function printReceipt() {
            window.print();
        }
    </script>
</body>
</html>
